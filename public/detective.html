<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mode Détective — Endercover</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .hint-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem 1.25rem;margin-bottom:8px;animation:slide-in 0.3s ease;}
    @keyframes slide-in{from{transform:translateY(-10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
    .hint-number{display:inline-block;width:24px;height:24px;border-radius:50%;background:var(--purple);color:#fff;font-size:11px;font-weight:700;text-align:center;line-height:24px;margin-right:8px;flex-shrink:0;}
    .hint-text{font-size:15px;color:var(--text);}
    .hint-row{display:flex;align-items:center;gap:4px;}
    .pts-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;}
    .pts-5{background:rgba(29,158,117,0.2);color:#5DCAA5;border:1px solid rgba(29,158,117,0.3);}
    .pts-4{background:rgba(83,74,183,0.2);color:#7F77DD;border:1px solid rgba(83,74,183,0.3);}
    .pts-3{background:rgba(239,159,39,0.2);color:#EF9F27;border:1px solid rgba(239,159,39,0.3);}
    .pts-2{background:rgba(226,75,74,0.2);color:#E24B4A;border:1px solid rgba(226,75,74,0.3);}
    .pts-1{background:rgba(139,137,160,0.2);color:#8b89a0;border:1px solid rgba(139,137,160,0.3);}
    .char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;max-height:220px;overflow-y:auto;margin:8px 0;}
    .char-opt{padding:6px 8px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all 0.15s;}
    .char-opt:hover{background:rgba(83,74,183,0.2);border-color:var(--purple-light);}
    .char-opt.selected{border:2px solid var(--purple-light);background:rgba(83,74,183,0.3);color:#CECBF6;}
    .score-big{font-size:48px;font-weight:800;text-align:center;color:var(--purple-light);}
    .streak-badge{display:inline-block;padding:4px 14px;border-radius:20px;background:rgba(239,159,39,0.15);color:#EF9F27;border:1px solid rgba(239,159,39,0.3);font-size:13px;font-weight:600;}
    .lives{font-size:22px;letter-spacing:4px;text-align:center;}
    .progress-hints{height:4px;background:var(--bg2);border-radius:2px;margin-bottom:1rem;}
    .progress-hints-fill{height:100%;border-radius:2px;background:var(--purple-light);transition:width 0.5s;}
    .char-search{width:100%;padding:8px 12px;font-size:14px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);margin-bottom:8px;outline:none;}
    .char-search::placeholder{color:var(--muted);}
    .answer-feedback{text-align:center;padding:1rem;border-radius:16px;font-size:18px;font-weight:700;margin:8px 0;animation:pulse 0.4s ease;}
    @keyframes pulse{0%{transform:scale(0.9);}50%{transform:scale(1.05);}100%{transform:scale(1);}}
    .feedback-correct{background:rgba(29,158,117,0.15);color:#5DCAA5;border:1px solid rgba(29,158,117,0.3);}
    .feedback-wrong{background:rgba(226,75,74,0.15);color:#E24B4A;border:1px solid rgba(226,75,74,0.3);}
    .best-score{font-size:13px;color:var(--muted);text-align:center;}
    .uni-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
    .uni-pill{padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;background:var(--card);border:1px solid var(--border);color:var(--muted);transition:all 0.15s;}
    .uni-pill.active{background:rgba(83,74,183,0.2);border-color:var(--purple-light);color:var(--text);}
  </style>
</head>
<body>

<div id="screen-home" class="screen active">
  <a href="/" style="font-size:13px;color:var(--muted);text-decoration:none;display:block;margin-top:1.5rem;">← Endercover</a>
  <div class="logo" style="margin-top:1rem;">🔍 Détective</div>
  <div class="tagline">Devine le personnage avec le moins d'indices possible</div>

  <div class="card">
    <div class="card-label">Univers à inclure</div>
    <div class="uni-filter" id="uni-filter"></div>
  </div>

  <div class="card">
    <div class="card-label">Difficulté</div>
    <div style="display:flex;gap:8px;">
      <button class="uni-pill active" id="diff-easy" onclick="setDiff('easy')">😊 Facile</button>
      <button class="uni-pill" id="diff-medium" onclick="setDiff('medium')">🧠 Normal</button>
      <button class="uni-pill" id="diff-hard" onclick="setDiff('hard')">💀 Expert</button>
    </div>
    <div id="diff-desc" class="note" style="margin-top:8px;">5 indices disponibles, persos populaires</div>
  </div>

  <div class="best-score" id="best-score-display"></div>
  <button class="btn-primary btn-glow" onclick="startGame()" style="margin-top:8px;">Jouer</button>
</div>

<div id="screen-game" class="screen">
  <div class="top-bar">
    <div>
      <div class="section-label" id="game-round-label"></div>
      <div class="streak-badge" id="streak-badge" style="display:none;margin-top:4px;"></div>
    </div>
    <div style="text-align:right;">
      <div class="section-label">Score</div>
      <div style="font-size:20px;font-weight:700;color:var(--purple-light);" id="game-score">0</div>
    </div>
  </div>

  <div class="lives" id="game-lives"></div>
  <div class="progress-hints"><div class="progress-hints-fill" id="hints-progress"></div></div>

  <div id="hints-container"></div>

  <div id="answer-feedback" style="display:none;" class="answer-feedback"></div>

  <div id="guess-area" class="card">
    <div class="card-label">Qui est ce personnage ?</div>
    <input class="char-search" id="guess-search" placeholder="Rechercher..." oninput="filterGuessChars()"/>
    <div class="char-grid" id="guess-grid"></div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn-primary" id="confirm-guess-btn" onclick="confirmGuess()" disabled style="flex:1;">Confirmer</button>
      <button class="btn-secondary" onclick="revealHint()" id="hint-btn" style="flex:1;">Indice suivant 💡</button>
    </div>
  </div>
</div>

<div id="screen-result" class="screen">
  <div class="result-icon">🏆</div>
  <div class="result-title">Partie terminée !</div>
  <div class="score-big" id="final-score"></div>
  <div class="best-score" id="final-best"></div>
  <div class="card" style="margin-top:1rem;">
    <div class="card-label">Récap</div>
    <div id="result-recap"></div>
  </div>
  <button class="btn-primary btn-glow" onclick="restartGame()" style="margin-top:1rem;">Rejouer</button>
  <a href="/" class="btn-secondary" style="display:block;text-align:center;text-decoration:none;padding:12px;margin-top:8px;">← Retour</a>
</div>

// Flat list of all chars with their universe
const CHAR_DATA = [];
Object.entries(CHARACTERS).forEach(([uni, chars]) => {
  chars.forEach(c => {
    if(c.hints && c.hints.length >= 5) CHAR_DATA.push({name:c.name, uni, hints:c.hints});
  });
});

const ALL_CHARS_LIST = CHAR_DATA.map(c=>c.name);

// State
let selectedUnis = [...UNIVERSES];
let difficulty = 'easy';
let currentChar = null;
let hintsRevealed = 0;
let maxHints = 5;
let score = 0;
let streak = 0;
let lives = 3;
let round = 0;
let shuffledPool = [];
let poolIndex = 0;
let totalRounds = 10;
let roundResults = [];
let selectedGuess = null;

const DIFF = {
  easy:   {maxHints:5, rounds:8,  lives:3, desc:'5 indices disponibles, persos populaires'},
  medium: {maxHints:8, rounds:10, lives:3, desc:'8 indices, tous les personnages'},
  hard:   {maxHints:7, rounds:12, lives:2, desc:'7 indices max, tous persos, 2 vies — vraiment dur !'},
};

function setDiff(d){
  difficulty=d;
  ['easy','medium','hard'].forEach(x=>{
    document.getElementById('diff-'+x).classList.toggle('active',x===d);
  });
  document.getElementById('diff-desc').textContent=DIFF[d].desc;
}

function initUniverseFilter(){
  const f=document.getElementById('uni-filter');
  f.innerHTML=UNIVERSES.map(u=>`<div class="uni-pill active" id="upill-${u.replace(/[^a-z]/gi,'')}" onclick="toggleUni('${u}')">${u}</div>`).join('');
}

function toggleUni(u){
  if(selectedUnis.includes(u)){
    if(selectedUnis.length<=1)return;
    selectedUnis=selectedUnis.filter(x=>x!==u);
  }else{
    selectedUnis.push(u);
  }
  const id='upill-'+u.replace(/[^a-z]/gi,'');
  document.getElementById(id).classList.toggle('active',selectedUnis.includes(u));
}

function getAvailableChars(){
  return CHAR_DATA.filter(c=>selectedUnis.includes(c.uni));
}

function startGame(){
  const d=DIFF[difficulty];
  maxHints=d.maxHints;
  totalRounds=d.rounds;
  lives=d.lives;
  score=0;streak=0;round=0;roundResults=[];const p=getAvailableChars();shuffledPool=p.sort(()=>Math.random()-0.5);poolIndex=0;
  nextRound();
  show('game');
}

function nextRound(){
  round++;
  selectedGuess=null;
  hintsRevealed=0;
  // Anti-répétition : on épuise tout le pool avant de recommencer
  if(poolIndex>=shuffledPool.length){
    // Remélanger en évitant que le premier soit le même que le dernier
    const last=shuffledPool[shuffledPool.length-1];
    do{ shuffledPool=[...shuffledPool].sort(()=>Math.random()-0.5); }
    while(shuffledPool.length>1 && shuffledPool[0]===last);
    poolIndex=0;
  }
  currentChar=shuffledPool[poolIndex++];
  document.getElementById('game-round-label').textContent=`Personnage ${round}/${totalRounds}`;
  document.getElementById('game-score').textContent=score;
  document.getElementById('game-lives').textContent='❤️'.repeat(lives)+'🖤'.repeat(Math.max(0,3-lives));
  document.getElementById('hints-container').innerHTML='';
  document.getElementById('answer-feedback').style.display='none';
  document.getElementById('hint-btn').disabled=false;
  document.getElementById('hint-btn').textContent='Indice suivant 💡';
  document.getElementById('confirm-guess-btn').disabled=true;
  document.getElementById('guess-search').value='';
  filterGuessChars();
  document.getElementById('hints-progress').style.width='0%';
  const streak=document.getElementById('streak-badge');
  if(streak.dataset.streak>1){streak.style.display='block';streak.textContent='🔥 Série x'+streak.dataset.streak;}
  else streak.style.display='none';
  revealHint();
}

function revealHint(){
  if(hintsRevealed>=Math.min(maxHints,currentChar.hints.length)){
    document.getElementById('hint-btn').disabled=true;
    return;
  }
  hintsRevealed++;
  const pts=Math.max(1,maxHints-hintsRevealed+1);
  const ptsClass=pts>=5?'pts-5':pts===4?'pts-4':pts===3?'pts-3':pts===2?'pts-2':'pts-1';
  const container=document.getElementById('hints-container');
  const div=document.createElement('div');
  div.className='hint-card';
  div.innerHTML=`<div class="hint-row"><span class="hint-number">${hintsRevealed}</span><span class="hint-text">${currentChar.hints[hintsRevealed-1]}</span><span class="pts-badge ${ptsClass} ml-auto" style="margin-left:auto">+${pts}</span></div>`;
  container.appendChild(div);
  container.scrollTop=container.scrollHeight;
  const pct=(hintsRevealed/Math.min(maxHints,currentChar.hints.length))*100;
  document.getElementById('hints-progress').style.width=pct+'%';
  if(hintsRevealed>=Math.min(maxHints,currentChar.hints.length)){
    document.getElementById('hint-btn').disabled=true;
    document.getElementById('hint-btn').textContent='Plus d\'indices';
  }
}

function filterGuessChars(){
  const q=document.getElementById('guess-search').value.toLowerCase();
  const pool=getAvailableChars().map(c=>c.name);
  const filtered=pool.filter(n=>n.toLowerCase().includes(q));
  const grid=document.getElementById('guess-grid');
  grid.innerHTML=filtered.map(n=>`<div class="char-opt${selectedGuess===n?' selected':''}" onclick="selectGuess('${n}')">${n}</div>`).join('');
}

function selectGuess(name){
  selectedGuess=name;
  filterGuessChars();
  document.getElementById('confirm-guess-btn').disabled=false;
}

function confirmGuess(){
  if(!selectedGuess)return;
  const correct=selectedGuess===currentChar.name;
  const pts=correct?Math.max(1,maxHints-hintsRevealed+1):0;
  if(correct){
    score+=pts;
    streak++;
    const fb=document.getElementById('answer-feedback');
    fb.style.display='block';
    fb.className='answer-feedback feedback-correct';
    fb.textContent=`✓ Correct ! +${pts} pts — C'était ${currentChar.name} (${currentChar.uni})`;
  }else{
    lives--;
    streak=0;
    const fb=document.getElementById('answer-feedback');
    fb.style.display='block';
    fb.className='answer-feedback feedback-wrong';
    fb.textContent=`✗ Faux ! C'était ${currentChar.name} (${currentChar.uni})`;
  }
  roundResults.push({name:currentChar.name,uni:currentChar.uni,guess:selectedGuess,correct,pts,hintsUsed:hintsRevealed});
  document.getElementById('game-lives').textContent='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives));
  document.getElementById('game-score').textContent=score;
  const sb=document.getElementById('streak-badge');
  sb.dataset.streak=streak;
  if(streak>1){sb.style.display='block';sb.textContent=`🔥 Série x${streak}`;}
  document.getElementById('confirm-guess-btn').disabled=true;
  document.getElementById('hint-btn').disabled=true;
  if(lives<=0||round>=totalRounds){
    setTimeout(endGame,1500);
  }else{
    setTimeout(nextRound,1500);
  }
}

function endGame(){
  const best=parseInt(localStorage.getItem('detective_best_'+difficulty)||'0');
  if(score>best)localStorage.setItem('detective_best_'+difficulty,score);
  document.getElementById('final-score').textContent=score+' pts';
  document.getElementById('final-best').textContent=score>best?'🏆 Nouveau record !':'Record : '+Math.max(score,best)+' pts';
  document.getElementById('result-recap').innerHTML=roundResults.map(r=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
      <span>${r.correct?'✓':'✗'}</span>
      <span style="flex:1;color:${r.correct?'#5DCAA5':'#E24B4A'}">${r.name} <span style="color:var(--muted)">(${r.uni})</span></span>
      <span style="color:var(--muted)">${r.hintsUsed} indices</span>
      <span style="color:var(--purple-light);font-weight:700">${r.correct?'+'+r.pts:''}</span>
    </div>`).join('');
  show('result');
}

function restartGame(){show('home');}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');}

window.addEventListener('load',()=>{
  initUniverseFilter();
  ['easy','medium','hard'].forEach(d=>{
    const best=localStorage.getItem('detective_best_'+d);
    if(best) document.getElementById('best-score-display').textContent=`Meilleur score (${d}): ${best} pts`;
  });
});
</script>
